# -------------------------------------------------------------------
# KUBERNETES CONTROL PLANE NODES
# -------------------------------------------------------------------
[masters]
master1-ubuntu ansible_host=10.10.10.131

# -------------------------------------------------------------------
# KUBERNETES WORKER NODES
# -------------------------------------------------------------------
[workers]
worker1-ubuntu ansible_host=10.10.10.135

# -------------------------------------------------------------------
# EXTERNAL LOAD BALANCER NODE
# -------------------------------------------------------------------
; [loadbalancers]
; haproxy-ubuntu ansible_host=10.10.10.135

# -------------------------------------------------------------------
# ADD EXTERNAL NFS NODE
# -------------------------------------------------------------------
; [nfs]
; nfs-server ansible_host=10.0.0.225

# -------------------------------------------------------------------
# GROUPING: COMBINE MASTERS AND WORKERS INTO ONE CLUSTER GROUP
# -------------------------------------------------------------------
[k8s_cluster:children]
masters
workers

# -------------------------------------------------------------------
# GLOBAL VARIABLES FOR ALL HOSTS
# -------------------------------------------------------------------
[all:vars]
# The SSH key Ansible should use to connect (or copy over during your setup phase)
ansible_user=startsm
ansible_ssh_private_key_file=~/.ssh/
