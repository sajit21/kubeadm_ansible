---
- name: Check if this worker is already joined
  ansible.builtin.stat:
    path: "{{ setup_worker_kubelet_conf_path }}"
  register: setup_worker_kubelet_conf_stat

- name: Read worker join command from controller
  ansible.builtin.slurp:
    src: "{{ setup_worker_join_command_file }}"
  register: setup_worker_join_cmd_raw
  delegate_to: localhost
  become: false
  when: not setup_worker_kubelet_conf_stat.stat.exists

- name: Run kubeadm join
  become: true
  ansible.builtin.command: "{{ setup_worker_join_cmd_raw.content | b64decode | trim }}"
  register: setup_worker_join_result
  when: not setup_worker_kubelet_conf_stat.stat.exists
  changed_when: "'This node has joined the cluster' in setup_worker_join_result.stdout"