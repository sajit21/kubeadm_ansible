---
- name: Wait for calico-node pods to be running
  become: true
  ansible.builtin.command: >-
    kubectl --kubeconfig={{ setup_cni_kubeconfig }}
    -n calico-system get pods -l k8s-app=calico-node
    -o jsonpath='{.items[*].status.phase}'
  register: setup_cni_calico_pods
  until: >-
    setup_cni_calico_pods.stdout != '' and
    'Pending' not in setup_cni_calico_pods.stdout and
    'Failed' not in setup_cni_calico_pods.stdout
  retries: 20
  delay: 15
  changed_when: false

- name: Wait for first master node to report Ready
  become: true
  ansible.builtin.command: >-
    kubectl --kubeconfig={{ setup_cni_kubeconfig }}
    get node {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: setup_cni_node_ready
  until: setup_cni_node_ready.stdout == "True"
  retries: 20
  delay: 15
  changed_when: false