---
# Since k8s v1.29, admin.conf isn't bound to cluster-admin until after init.
# kube-vip's static pod must start using super-admin.conf during bootstrap,
# then get patched back to admin.conf once the cluster is up and RBAC is set.
- name: Check kube-vip manifest currently points at super-admin.conf
  become: true
  ansible.builtin.command: >-
    grep -q '/etc/kubernetes/super-admin.conf' {{ setup_first_master_kubevip_manifest_path }}
  register: setup_first_master_kubevip_superadmin_check
  failed_when: false
  changed_when: false

- name: Patch kube-vip static pod to use admin.conf instead of super-admin.conf
  become: true
  ansible.builtin.replace:
    path: "{{ setup_first_master_kubevip_manifest_path }}"
    regexp: '/etc/kubernetes/super-admin\.conf'
    replace: '/etc/kubernetes/admin.conf'
  when: setup_first_master_kubevip_superadmin_check.rc == 0
  register: setup_first_master_kubevip_patched

- name: Restart kubelet to pick up patched kube-vip manifest
  become: true
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
  when: setup_first_master_kubevip_patched is changed

- name: Wait for API server to become reachable again after kube-vip restart
  become: true
  ansible.builtin.command: >-
    kubectl --kubeconfig={{ setup_first_master_admin_conf_path }} get nodes
  register: setup_first_master_api_check
  retries: 12
  delay: 5
  until: setup_first_master_api_check.rc == 0
  changed_when: false
  when: setup_first_master_kubevip_patched is changed