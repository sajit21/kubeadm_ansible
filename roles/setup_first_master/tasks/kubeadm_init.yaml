---
- name: Check if cluster is already initialized
  ansible.builtin.stat:
    path: "{{ setup_first_master_admin_conf_path }}"
  register: setup_first_master_admin_conf_stat

- name: Render kubeadm init config
  become: true
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /root/kubeadm-config.yaml
    owner: root
    group: root
    mode: "0600"
  when: not setup_first_master_admin_conf_stat.stat.exists

- name: Run kubeadm init
  become: true
  ansible.builtin.command: >-
    kubeadm init
    --config /root/kubeadm-config.yaml
    --upload-certs
  register: setup_first_master_init_result
  when: not setup_first_master_admin_conf_stat.stat.exists
  changed_when: "'Your Kubernetes control-plane has initialized successfully' in setup_first_master_init_result.stdout"

- name: Show kubeadm init output
  ansible.builtin.debug:
    msg: "{{ setup_first_master_init_result.stdout_lines }}"
  when: setup_first_master_init_result is defined and setup_first_master_init_result is changed