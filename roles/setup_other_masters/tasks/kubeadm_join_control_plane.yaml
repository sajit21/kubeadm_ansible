---
- name: Check if this master is already part of the cluster
  ansible.builtin.stat:
    path: "{{ setup_other_masters_admin_conf_path }}"
  register: setup_other_masters_admin_conf_stat

- name: Read control-plane join command from controller
  ansible.builtin.slurp:
    src: "{{ setup_other_masters_join_command_file }}"
  register: setup_other_masters_join_cmd_raw
  delegate_to: localhost
  become: false
  when: not setup_other_masters_admin_conf_stat.stat.exists

- name: Run kubeadm join (control-plane)
  become: true
  ansible.builtin.command: "{{ setup_other_masters_join_cmd_raw.content | b64decode | trim }}"
  register: setup_other_masters_join_result
  when: not setup_other_masters_admin_conf_stat.stat.exists
  changed_when: "'This node has joined the cluster' in setup_other_masters_join_result.stdout"

# --certificate-key expires ~2h after upload-certs. If the join fails because
# of an expired key, this regenerates it on masters[0] and retries once.
- name: Retry join with a fresh certificate key if the saved one expired
  when:
    - not setup_other_masters_admin_conf_stat.stat.exists
    - setup_other_masters_join_result is failed
  block:
    - name: Regenerate certificate key on first master
      become: true
      ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
      register: setup_other_masters_new_certs
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: false

    - name: Extract fresh certificate key
      ansible.builtin.set_fact:
        setup_other_masters_fresh_cert_key: "{{ setup_other_masters_new_certs.stdout_lines[-1] }}"

    - name: Generate a fresh worker-style join command from first master
      become: true
      ansible.builtin.command: kubeadm token create --print-join-command
      register: setup_other_masters_fresh_base_join
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: false

    - name: Retry kubeadm join with fresh certificate key
      become: true
      ansible.builtin.command: >-
        {{ setup_other_masters_fresh_base_join.stdout }}
        --control-plane --certificate-key {{ setup_other_masters_fresh_cert_key }}
      changed_when: true

- name: Configure kubectl for this master
  become: true
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Copy admin.conf to user's kube config
  become: true
  ansible.builtin.copy:
    src: "{{ setup_other_masters_admin_conf_path }}"
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    remote_src: true